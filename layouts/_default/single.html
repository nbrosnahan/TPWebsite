{{ define "main" }}
<div class="content">
  <article class="post">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <div class="post-meta">
        {{ if not .Date.IsZero }}<time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>{{ end }}
        {{ with .Params.tags }}
        <div class="tags">
          {{ range . }}<a href="{{ "/tags/" | relURL }}{{ . | urlize }}/" class="tag">{{ . }}</a>{{ end }}
        </div>
        {{ end }}
      </div>
    </header>
    <div class="post-body">
      {{ .Content }}
    </div>
    <nav class="post-nav">
      {{ with .PrevInSection }}
        <a href="{{ .RelPermalink }}" class="post-nav-prev">← {{ .Title }}</a>
      {{ end }}
      {{ with .NextInSection }}
        <a href="{{ .RelPermalink }}" class="post-nav-next">{{ .Title }} →</a>
      {{ end }}
    </nav>
  </article>
</div>
{{ end }}
